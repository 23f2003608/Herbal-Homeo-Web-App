{% extends "base.html" %}
{% block content %}

<style>
    .edit-container {
        max-width: 900px;
        margin-top: 2rem;
    }

    /* Glassmorphism Form Card */
    .edit-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 2rem;
        box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        overflow: hidden;
    }

    .edit-header {
        background: linear-gradient(135deg, #059669 0%, #064e3b 100%);
        padding: 2.5rem;
        color: white;
    }

    /* Form Input Styling */
    .form-group-custom {
        background: #ffffff;
        border: 1px solid #e2f0e5;
        border-radius: 1rem;
        padding: 0.75rem 1rem;
        transition: all 0.2s ease;
    }

    .form-group-custom:focus-within {
        border-color: #006d0f;
        box-shadow: 0 0 0 4px rgba(99, 241, 144, 0.1);
    }

    .form-label-custom {
        font-size: 0.75rem;
        font-weight: 700;
        text-uppercase;
        letter-spacing: 0.05em;
        color: #47694a;
        margin-bottom: 4px;
        display: block;
    }

    .form-control-custom {
        border: none;
        padding: 0;
        font-weight: 600;
        color: #1e293b;
        width: 100%;
        background: transparent;
    }

    .form-control-custom:focus {
        outline: none;
        box-shadow: none;
    }

    .icon-addon {
        color: #94b898;
        font-size: 1.1rem;
    }

    /* Action Buttons */
    .btn-save {
        background: #064e3b;
        color: white;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: 0.8rem;
        font-weight: 700;
        transition: 0.3s;
    }

    .btn-save:hover {
        background: #059669;
        transform: translateY(-2px);
        box-shadow: 0 0 0 4px rgba(99, 241, 144, 0.1);
    }
</style>

<div class="container edit-container pb-5">
    <div class="edit-card">
        <div class="edit-header">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <a href="{{ url_for('patients.patients_list') }}" class="btn btn-sm btn-light bg-opacity-20 border-0 text-white rounded-circle">
                    <i class="bi bi-arrow-left text-dark"></i>
                </a>
                <span class="badge bg-white bg-opacity-20 px-3 py-2 rounded-pill small text-dark">Patient ID: {{ patient.id }}</span>
            </div>
            <h3 class="fw-bold mb-1">Update Case File</h3>
            <p class="text-white text-opacity-75 mb-0">Modify patient registration details and contact information.</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form method="POST">
                <div class="row g-4">
                    <div class="col-12">
                        <div class="form-group-custom d-flex align-items-center gap-3">
                            <div class="icon-addon"><i class="bi bi-person-circle"></i></div>
                            <div class="flex-grow-1">
                                <label class="form-label-custom">Full Name <span class="text-danger">*</span></label>
                                <input type="text" name="name" class="form-control-custom" value="{{ patient.name }}" placeholder="e.g. John Doe" required>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group-custom d-flex align-items-center gap-3">
                            <div class="icon-addon"><i class="bi bi-card-heading"></i></div>
                            <div class="flex-grow-1">
                                <label class="form-label-custom">Clinic Card ID</label>
                                <input type="text" name="card_id" class="form-control-custom" value="{{ patient.card_id or '' }}" placeholder="Manual ID if any">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group-custom d-flex align-items-center gap-3 border-success border-opacity-25">
                            <div class="icon-addon text-success"><i class="bi bi-telephone-fill"></i></div>
                            <div class="flex-grow-1">
                                <label class="form-label-custom">Primary Contact <span class="text-danger">*</span></label>
                                <input type="text" name="phone" class="form-control-custom" value="{{ patient.phone }}" placeholder="+91 00000 00000" required>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group-custom d-flex align-items-center gap-3">
                            <div class="icon-addon"><i class="bi bi-gender-ambiguous"></i></div>
                            <div class="flex-grow-1">
                                <label class="form-label-custom">Gender</label>
                                <select class="form-control-custom" name="gender">
                                    <option value="">Choose...</option>
                                    <option value="Male" {{ 'selected' if patient.gender == 'Male' }}>Male</option>
                                    <option value="Female" {{ 'selected' if patient.gender == 'Female' }}>Female</option>
                                    <option value="Other" {{ 'selected' if patient.gender == 'Other' }}>Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group-custom d-flex align-items-start gap-3">
                            <div class="icon-addon mt-1"><i class="bi bi-geo-alt"></i></div>
                            <div class="flex-grow-1">
                                <label class="form-label-custom">Residential Address</label>
                                <textarea name="address" class="form-control-custom" rows="1" placeholder="City, Area...">{{ patient.address or '' }}</textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 pt-4 border-top d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <div class="text-muted small">
                        <i class="bi bi-info-circle me-1"></i> Last updated: {{ patient.created_at.strftime('%d %b %Y') }}
                    </div>
                    <div class="d-flex gap-3">
                        <a href="{{ url_for('patients.patients_list') }}" class="btn btn-link text-decoration-none text-muted fw-bold">Discard Changes</a>
                        <button type="submit" class="btn btn-save px-5">
                            Update Patient Records <i class="bi bi-check-all ms-2"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
